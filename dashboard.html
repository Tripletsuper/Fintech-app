<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Citiigroup Dashboard</title>

<link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<header>
<div class="container">
<h2>Citiigroup Dashboard</h2>
<button id="logoutBtn">Logout</button>
</div>
</header>

<main class="container">

<!-- BALANCE CARD -->
<div class="card balance">
<h3>Available Balance</h3>
<h1>$896,000.00</h1>
<p>Account ending in 4582</p>
</div>

<!-- QUICK ACTIONS -->
<div class="card">
<h3>Quick Actions</h3>

<div class="btn-row">
<button class="btn-small">Add Money</button>
<button class="btn-small">Send Money</button>
<button class="btn-small">Deposit</button>
<button class="btn-small">Withdraw</button>
</div>
</div>

<!-- TRANSACTIONS -->
<div class="card">
<h3>Recent Transactions</h3>

<div class="list">

<div class="item">
<span>Salary Deposit</span>
<span class="positive">+$5,200</span>
</div>

<div class="item">
<span>Transfer from John</span>
<span class="positive">+$850</span>
</div>

<div class="item">
<span>Walmart</span>
<span class="negative">-$127.50</span>
</div>

<div class="item">
<span>Netflix</span>
<span class="negative">-$15.99</span>
</div>

<div class="item">
<span>Investment Return</span>
<span class="positive">+$3,450</span>
</div>

</div>
</div>

</main>

<script src="assets/js/auth.js"></script>

</body>
</html>
